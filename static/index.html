<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus RAG | Enterprise Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="nexus">NEXUS</span><span class="rag">RAG</span>
            </div>
            <p class="subtitle">Enterprise Retrieval-Augmented Generation Engine</p>
        </header>

        <main>
            <section class="upload-section">
                <h2>1. Train the Engine</h2>
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept="application/pdf" hidden>
                    <div class="upload-content">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <p>Drag & Drop your Enterprise PDF here</p>
                        <button class="btn primary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                    </div>
                </div>
                <div id="upload-status" class="status-message"></div>
            </section>

            <section class="chat-section">
                <h2>2. Query the Knowledge Base</h2>
                <div class="chat-box" id="chat-history">
                    <div class="message system-msg">
                        <div class="avatar">⚡️</div>
                        <div class="msg-content">Welcome to Nexus RAG! Upload a document above, and then ask me anything about it. All processing runs 100% locally and privately via Ollama.</div>
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="question-input" placeholder="Ask a question about the document..." disabled>
                    <button id="send-btn" class="btn active-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
